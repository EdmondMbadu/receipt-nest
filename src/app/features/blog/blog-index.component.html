<div class="min-h-screen bg-white text-slate-950 dark:bg-slate-950 dark:text-white">
  <header class="border-b border-slate-200 bg-white/90 backdrop-blur dark:border-slate-800 dark:bg-slate-950/90">
    <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center gap-2">
        <img src="assets/receipt-nest.png" alt="ReceiptNest AI" class="h-9 w-9 object-contain" />
        <span class="font-semibold">
          <span>Receipt</span><span class="text-emerald-700 dark:text-emerald-300">Nest</span><span class="ml-1 text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-300">AI</span>
        </span>
      </a>

      <div class="flex items-center gap-3">
        <a routerLink="/login" class="hidden text-sm font-medium text-slate-600 hover:text-slate-950 dark:text-slate-300 dark:hover:text-white sm:inline-flex">Sign in</a>
        <a routerLink="/register" class="inline-flex items-center justify-center rounded-xl bg-slate-950 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800 dark:bg-white dark:text-slate-950 dark:hover:bg-slate-100">Start free</a>
        <button type="button" (click)="toggleTheme()"
          class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-slate-500 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-white"
          aria-label="Toggle theme">
          <svg *ngIf="isDarkMode()" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <svg *ngIf="!isDarkMode()" class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <section class="border-b border-slate-200 bg-slate-50/70 py-16 dark:border-slate-800 dark:bg-slate-900/30 sm:py-20">
      <div class="mx-auto max-w-5xl px-4 text-center sm:px-6 lg:px-8">
        <p class="text-sm font-semibold uppercase tracking-wide text-emerald-700 dark:text-emerald-300">ReceiptNest AI</p>
        <h1 class="mt-4 text-4xl font-bold leading-tight tracking-tight text-slate-950 dark:text-white sm:text-6xl">
          The ReceiptNest Blog
        </h1>
        <p class="mx-auto mt-5 max-w-2xl text-lg leading-8 text-slate-600 dark:text-slate-300">
          Clarity on receipts, taxes, and money for the self-employed.
        </p>
      </div>
    </section>

    <section class="py-12 sm:py-16">
      <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex flex-wrap justify-center gap-2">
          <button type="button" (click)="selectCategory('All')"
            class="rounded-full border px-4 py-2 text-sm font-semibold transition"
            [ngClass]="selectedCategory() === 'All' ? 'border-emerald-600 bg-emerald-600 text-white shadow-sm shadow-emerald-600/20' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300 hover:text-slate-950 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-emerald-700 dark:hover:text-white'">
            All
          </button>
          <button *ngFor="let category of categories" type="button" (click)="selectCategory(category)"
            class="rounded-full border px-4 py-2 text-sm font-semibold transition"
            [ngClass]="selectedCategory() === category ? 'border-emerald-600 bg-emerald-600 text-white shadow-sm shadow-emerald-600/20' : 'border-slate-200 bg-white text-slate-600 hover:border-emerald-300 hover:text-slate-950 dark:border-slate-800 dark:bg-slate-900 dark:text-slate-300 dark:hover:border-emerald-700 dark:hover:text-white'">
            {{ category }}
          </button>
        </div>

        <div class="mt-10 grid gap-6 md:grid-cols-2 lg:grid-cols-3">
          <article *ngFor="let post of filteredPosts()"
            class="group overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition duration-200 hover:-translate-y-1 hover:border-emerald-300 hover:shadow-xl hover:shadow-slate-900/10 dark:border-slate-800 dark:bg-slate-900 dark:hover:border-emerald-700 dark:hover:shadow-black/25">
            <a [routerLink]="post.path" class="block">
              <div class="aspect-[16/10] overflow-hidden bg-slate-100 dark:bg-slate-800">
                <img [src]="post.image" [alt]="post.imageAlt" class="h-full w-full object-cover transition duration-300 group-hover:scale-[1.03]" />
              </div>
              <div class="p-6">
                <div class="flex items-center justify-between gap-3">
                  <span class="rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold uppercase tracking-wide text-emerald-700 dark:bg-emerald-950 dark:text-emerald-300">{{ post.category }}</span>
                  <span class="text-xs font-medium text-slate-500 dark:text-slate-400">{{ post.readTime }}</span>
                </div>
                <h2 class="mt-4 text-xl font-bold leading-snug text-slate-950 group-hover:text-emerald-700 dark:text-white dark:group-hover:text-emerald-300">
                  {{ post.title }}
                </h2>
                <p class="mt-3 line-clamp-2 text-sm leading-6 text-slate-600 dark:text-slate-300">
                  {{ post.excerpt }}
                </p>
              </div>
            </a>
          </article>
        </div>
      </div>
    </section>
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-8 text-sm text-slate-500 dark:text-slate-400 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8">
      <p>© {{ currentYear }} ReceiptNest AI. All rights reserved.</p>
      <div class="flex flex-wrap gap-4">
        <a routerLink="/blog" class="hover:text-slate-950 dark:hover:text-white">Blog</a>
        <a routerLink="/support" class="hover:text-slate-950 dark:hover:text-white">Support</a>
        <a routerLink="/terms" class="hover:text-slate-950 dark:hover:text-white">Terms</a>
      </div>
    </div>
  </footer>
</div>
