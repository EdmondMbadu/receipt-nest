<div class="min-h-screen bg-slate-950 text-white">
  <div class="mx-auto flex min-h-screen max-w-2xl items-center px-6 py-16">
    <div class="w-full rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl shadow-emerald-950/40 backdrop-blur">
      <div class="inline-flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-500/15 text-emerald-300">
        <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5H9.75A2.25 2.25 0 0 0 7.5 6.75v10.5a2.25 2.25 0 0 0 2.25 2.25h4.5A2.25 2.25 0 0 0 16.5 17.25V9.75L13.5 6.75V4.5Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5v3A2.25 2.25 0 0 0 15.75 9.75h3" />
        </svg>
      </div>

      <h1 class="mt-6 text-3xl font-bold tracking-tight">{{ title() }}</h1>
      <p class="mt-3 text-base leading-7 text-slate-300">{{ description() }}</p>

      <div class="mt-8 flex flex-col gap-3 sm:flex-row">
        <a [href]="appLinkUrl()"
          class="inline-flex items-center justify-center rounded-2xl bg-emerald-500 px-5 py-3 text-sm font-semibold text-slate-950 transition hover:bg-emerald-400">
          Open App
        </a>
        <a routerLink="/"
          class="inline-flex items-center justify-center rounded-2xl border border-white/15 px-5 py-3 text-sm font-semibold text-white transition hover:bg-white/5">
          Continue On Web
        </a>
      </div>

      <p class="mt-6 text-sm text-slate-400">
        If nothing happens, return to ReceiptNest AI manually and your billing status will refresh automatically.
      </p>
    </div>
  </div>
</div>
